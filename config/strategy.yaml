strategy:
  id: trend_score_v1
  adjust: qfq
  lookback_days: 120
  n_short: 5
  n_mid: 20
  n_long: 40
  w_bias_short: 0.4
  w_bias_mid: 0.4
  w_bias_long: 0.2
  w_slope_short: 0.4
  w_slope_mid: 0.4
  w_slope_long: 0.2
  w_bias_norm: 0.5
  w_slope_norm: 0.5
  vol_ma_period: 20
  er_period: 10
  w_vol: 0.3
  w_er: 0.7
  atr_period: 20
  hard_stop_atr_mul_default: 1.5
  chandelier_stop_atr_mul: 2.5
  max_position_vs_equal_weight: 1.5
  entry_threshold_min: 10
  entry_threshold_max: 20
  fee_rate: 0.000085
  fee_min: 5
  slippage: 0.002
  benchmark: equal_weight_pool
  backtest_start_primary: "2025-01-01"
  backtest_start_fallback: "2018-01-01"
  momentum_topn:
    max_holdings: 5
    ranking_mode: hybrid
    momentum_window_short: 10
    momentum_window_long: 20
    momentum_weight_short: 0.6
    momentum_weight_long: 0.4
    hybrid_weight_momentum: 1.0
    hybrid_weight_trend: 0.0
    rebalance_frequency: weekly
    rebalance_weekday: 1
    buy_filters:
      - price_above_ma20
    sell_signals:
      - hard_stop
      - chandelier_stop
  momentum_topn_v2:
    buy_filters:
      - price_above_ma20
      - price_above_ma60
    sell_signals:
      - hard_stop
      - chandelier_stop
      - ma_breakdown_max
    buy_filter_price_above_ma60: true
    exit_ma_period: 30
  momentum_topn_v3:
    buy_filters:
      - price_above_ma20
      - price_above_ma60
      - trend_score_max
    sell_signals:
      - hard_stop
      - chandelier_stop
      - ma_breakdown_max
    buy_filter_price_above_ma60: true
    exit_ma_period: 30
    max_entry_trend_score: 20
