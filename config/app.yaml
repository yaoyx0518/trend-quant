app:
  timezone: Asia/Shanghai
  data_provider_priority:
    - tickflow
  update_time_after_close: "16:30"
  daily_update_max_retries: 2
  daily_update_retry_interval_seconds: 5

# TickFlow CN Starter subscription limits (verified against the public pricing API).
# The application uses the authenticated API endpoint only; the unregistered trial
# endpoint is deliberately not configured or used.
tickflow:
  plan: starter
  api_base_url: "https://api.tickflow.org"
  daily_kline_batch_size: 100
  daily_kline_batch_requests_per_minute: 30
  daily_kline_batch_max_workers: 1
  daily_kline_single_requests_per_minute: 60
  quote_max_symbols_per_request: 50
  quote_requests_per_minute: 60

logging:
  level: INFO
