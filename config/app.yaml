app:
  name: trend-etf-system
  timezone: Asia/Shanghai
  host: 127.0.0.1
  port: 8000
  data_provider_priority:
    - efinance
    - akshare
  polling_times:
    - "10:00"
    - "10:30"
    - "11:00"
    - "11:30"
    - "13:00"
    - "13:30"
    - "14:00"
    - "14:30"
  final_signal_time: "14:45"
  update_time_after_close: "15:30"
  market_fetch_retry_times: 3
  market_fetch_retry_interval_seconds: 20
  notify_retry_times: 2
  notify_retry_interval_seconds: 5
  lot_size: 100

runtime:
  account_equity_default: 200000
  ensure_dirs: true

logging:
  level: INFO
  keep_forever: true
