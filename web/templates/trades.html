{% extends "base.html" %}
{% block content %}
<section class="page-panel trades-page">
  <h2>手工交易录入</h2>

  <div class="bt-form-row">
    <label>日期 <input id="tradeDate" type="date" value="{{ trade_date }}"></label>
    <label>标的 <input id="symbol" type="text" placeholder="510330.SS"></label>
    <label>方向
      <select id="side">
        <option value="BUY">买入</option>
        <option value="SELL">卖出</option>
      </select>
    </label>
    <label>数量 <input id="qty" type="number" min="100" step="100"></label>
    <label>价格 <input id="price" type="number" min="0" step="0.001"></label>
    <label>费用 <input id="fee" type="number" min="0" step="0.01" value="5"></label>
    <label>时间 <input id="tradeTime" type="time" step="1" value="14:45:00"></label>
    <label>备注 <input id="note" type="text" placeholder="可选"></label>
    <button id="saveTradeBtn" type="button">保存交易</button>
  </div>

  <p id="tradeStatus" class="status-banner">就绪。</p>

  <div id="portfolioCards" class="cards"></div>

  <div class="table-panel">
    <h3>组合快照</h3>
    <div class="table-shell">
      <table id="portfolioTable">
        <thead><tr><th>标的</th><th>数量</th><th>可卖数量</th><th>均价</th><th>买入日期</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <div class="table-panel">
    <h3>手工交易（所选日期）</h3>
    <div class="table-shell">
      <table id="tradeTable">
        <thead>
          <tr><th>日期</th><th>标的</th><th>方向</th><th>数量</th><th>价格</th><th>费用</th><th>时间</th><th>备注</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</section>

<script>
(() => {
  const dateEl = document.getElementById('tradeDate');
  const statusEl = document.getElementById('tradeStatus');

  function num(v) {
    if (v === null || v === undefined || Number.isNaN(v)) return '-';
    return Number(v).toLocaleString(undefined, { maximumFractionDigits: 3 });
  }

  function setRows(selector, html) {
    const el = document.querySelector(selector);
    if (el) el.innerHTML = html;
  }

  function translateSide(value) {
    const side = String(value || '').toUpperCase();
    if (side === 'BUY') return '买入';
    if (side === 'SELL') return '卖出';
    return value || '';
  }

  async function loadTrades() {
    const d = dateEl.value;
    const resp = await fetch(`/trades/api/manual?trade_date=${encodeURIComponent(d)}`);
    const data = await resp.json();
    const items = data.items || [];

    setRows('#tradeTable tbody', items.length ? items.map(i => `
      <tr>
        <td>${i.trade_date || ''}</td>
        <td>${i.symbol_display || i.symbol || ''}</td>
        <td>${translateSide(i.side)}</td>
        <td>${num(i.qty)}</td>
        <td>${num(i.price)}</td>
        <td>${num(i.fee)}</td>
        <td>${i.trade_time || ''}</td>
        <td>${i.note || ''}</td>
      </tr>
    `).join('') : '<tr><td colspan="8">暂无记录。</td></tr>');
  }

  async function loadPortfolio() {
    const d = dateEl.value;
    const resp = await fetch(`/trades/api/portfolio?as_of_date=${encodeURIComponent(d)}`);
    const data = await resp.json();

    const cards = [
      ['日期', data.as_of_date || '-'],
      ['现金', num(data.cash)],
      ['持仓数', data.position_count ?? 0],
      ['已记录交易', data.trade_count ?? 0],
    ];
    document.getElementById('portfolioCards').innerHTML = cards.map(([k,v]) => `<div class="card"><div class="k">${k}</div><div class="v">${v}</div></div>`).join('');

    const rows = data.positions || [];
    setRows('#portfolioTable tbody', rows.length ? rows.map(p => `
      <tr>
        <td>${p.symbol_display || p.symbol || ''}</td>
        <td>${num(p.qty)}</td>
        <td>${num(p.sellable_qty)}</td>
        <td>${num(p.avg_price)}</td>
        <td>${p.buy_date || ''}</td>
      </tr>
    `).join('') : '<tr><td colspan="5">暂无持仓。</td></tr>');
  }

  async function saveTrade() {
    const payload = {
      trade_date: dateEl.value,
      symbol: document.getElementById('symbol').value,
      side: document.getElementById('side').value,
      qty: Number(document.getElementById('qty').value),
      price: Number(document.getElementById('price').value),
      fee: Number(document.getElementById('fee').value || 0),
      trade_time: document.getElementById('tradeTime').value,
      note: document.getElementById('note').value || '',
    };

    if (!payload.symbol || !payload.trade_date || !payload.trade_time || payload.qty <= 0 || payload.price <= 0) {
      statusEl.textContent = '请正确填写标的、日期、时间、数量和价格。';
      return;
    }

    statusEl.textContent = '正在保存...';
    const resp = await fetch('/trades/api/manual', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await resp.json();
    if (!resp.ok || !data.ok) {
      statusEl.textContent = `保存失败：${data.detail || '未知错误'}`;
      return;
    }

    statusEl.textContent = `已保存。${payload.trade_date} 当前共有 ${data.count} 条记录。`;
    await loadTrades();
    await loadPortfolio();
  }

  document.getElementById('saveTradeBtn').addEventListener('click', saveTrade);
  dateEl.addEventListener('change', async () => {
    await loadTrades();
    await loadPortfolio();
  });

  (async () => {
    await loadTrades();
    await loadPortfolio();
  })();
})();
</script>
{% endblock %}
