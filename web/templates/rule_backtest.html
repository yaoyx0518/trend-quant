{% extends "base.html" %}
{% block content %}
<style>
.rule-strategy-page .strategy-toolbar {
  display: flex;
  gap: 16px;
  align-items: center;
  justify-content: space-between;
  margin: 22px 0 16px;
  padding: 14px 16px;
  border: 1px solid rgba(20, 41, 51, 0.1);
  border-radius: 8px;
  background: linear-gradient(90deg, rgba(255, 255, 255, 0.94), rgba(236, 246, 242, 0.84));
}

.rule-strategy-page .strategy-toolbar > div {
  display: grid;
  gap: 4px;
}

.rule-strategy-page .strategy-toolbar-kicker {
  color: var(--accent-strong);
  font-size: 11px;
  font-weight: 900;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.rule-strategy-page .strategy-list {
  display: grid;
  gap: 18px;
  margin-top: 18px;
}

.rule-strategy-page .strategy-row {
  position: relative;
  display: grid;
  gap: 16px;
  min-width: 0;
  padding: 18px;
  overflow: hidden;
  border: 1px solid rgba(20, 41, 51, 0.12);
  border-radius: 8px;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(248, 252, 249, 0.92));
  box-shadow: 0 16px 34px rgba(17, 35, 42, 0.07);
}

.rule-strategy-page .strategy-row::before {
  content: "";
  position: absolute;
  inset: 0 auto 0 0;
  width: 5px;
  background: linear-gradient(180deg, var(--accent), var(--accent-warm));
}

.rule-strategy-page .strategy-row-head {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto auto;
  gap: 14px;
  align-items: start;
  min-width: 0;
  padding-left: 4px;
}

.rule-strategy-page .strategy-row-title h3 {
  margin: 0 0 8px;
  font-size: 1.18rem;
  letter-spacing: 0;
}

.rule-strategy-page .strategy-row-title p {
  margin: 0;
  color: var(--muted);
  line-height: 1.45;
}

.rule-strategy-page .strategy-row-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 6px 10px;
  align-items: center;
  justify-content: flex-end;
  max-width: 520px;
  color: var(--muted);
  font-size: 12px;
}

.rule-strategy-page .strategy-card-badge {
  flex: 0 0 auto;
  padding: 5px 9px;
  border: 1px solid rgba(20, 41, 51, 0.08);
  border-radius: 999px;
  color: var(--text-soft);
  background: rgba(229, 238, 233, 0.78);
  font-size: 12px;
  font-weight: 800;
}

.rule-strategy-page .strategy-row-rules {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
  gap: 14px;
  min-width: 0;
}

.rule-strategy-page .strategy-rule-panel {
  display: grid;
  align-content: start;
  gap: 12px;
  min-width: 0;
  padding: 14px;
  border: 1px solid rgba(20, 41, 51, 0.1);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.78);
}

.rule-strategy-page .strategy-rule-panel-buy {
  border-left: 4px solid var(--accent);
}

.rule-strategy-page .strategy-rule-panel-sell {
  border-left: 4px solid var(--accent-warm);
}

.rule-strategy-page .strategy-rule-panel-head {
  display: flex;
  gap: 10px;
  align-items: center;
  justify-content: space-between;
  color: var(--muted);
  font-size: 12px;
  font-weight: 800;
}

.rule-strategy-page .rule-side-label {
  color: var(--text);
  font-size: 14px;
  font-weight: 900;
  white-space: nowrap;
}

.rule-strategy-page .strategy-condition-list {
  display: grid;
  gap: 9px;
  margin: 0;
  padding: 0;
  list-style: none;
}

.rule-strategy-page .strategy-condition-item {
  display: grid;
  grid-template-columns: 34px minmax(0, 1fr) 42px minmax(0, 1fr);
  gap: 8px;
  align-items: center;
  min-width: 0;
  padding: 10px;
  border: 1px solid rgba(20, 41, 51, 0.08);
  border-radius: 8px;
  background: rgba(248, 252, 249, 0.9);
}

.rule-strategy-page .strategy-condition-index {
  display: inline-grid;
  width: 28px;
  height: 28px;
  place-items: center;
  border-radius: 8px;
  color: var(--accent-strong);
  background: var(--accent-soft);
  font-size: 11px;
  font-weight: 900;
}

.rule-strategy-page .strategy-condition-item strong {
  display: inline-grid;
  min-width: 36px;
  height: 28px;
  place-items: center;
  border-radius: 8px;
  color: var(--text);
  background: rgba(20, 41, 51, 0.06);
  font-size: 12px;
}

.rule-strategy-page .strategy-condition-left,
.rule-strategy-page .strategy-condition-right {
  min-width: 0;
  color: var(--text-soft);
  font-size: 13px;
  line-height: 1.35;
  overflow-wrap: anywhere;
}

.rule-strategy-page .strategy-condition-empty {
  padding: 18px 12px;
  border: 1px dashed rgba(20, 41, 51, 0.16);
  border-radius: 8px;
  color: var(--muted);
  font-size: 13px;
  text-align: center;
}

.rule-strategy-page .strategy-row-actions {
  display: flex;
  gap: 8px;
  align-items: center;
}

.rule-strategy-page .strategy-edit-btn,
.rule-strategy-page .strategy-copy-btn,
.rule-strategy-page .strategy-delete-btn {
  min-width: 76px;
}

.rule-strategy-page .strategy-delete-btn {
  border-color: rgba(193, 91, 88, 0.42);
  color: var(--danger);
}

.rule-strategy-page .strategy-delete-btn:hover:not(:disabled) {
  border-color: var(--danger);
  background: rgba(193, 91, 88, 0.08);
}

.rule-strategy-page .strategy-delete-dialog {
  width: min(520px, 100%);
}

.rule-strategy-page .strategy-delete-text {
  margin: 4px 0 18px;
  color: var(--text-soft);
  line-height: 1.6;
  overflow-wrap: anywhere;
}

.rule-strategy-page .strategy-danger-btn {
  border-color: var(--danger);
  background: linear-gradient(135deg, #c15b58 0%, #a54441 100%);
  box-shadow: 0 14px 26px rgba(193, 91, 88, 0.24);
}

.rule-strategy-page .strategy-danger-btn:hover:not(:disabled) {
  box-shadow: 0 20px 32px rgba(193, 91, 88, 0.28);
}

@media (max-width: 1100px) {
  .rule-strategy-page .strategy-row-head {
    grid-template-columns: minmax(0, 1fr) auto;
  }

  .rule-strategy-page .strategy-row-meta {
    grid-column: 1 / -1;
    justify-content: flex-start;
  }
}

@media (max-width: 720px) {
  .rule-strategy-page .strategy-toolbar {
    align-items: stretch;
    flex-direction: column;
  }

  .rule-strategy-page .strategy-row-head,
  .rule-strategy-page .strategy-row-rules {
    grid-template-columns: 1fr;
  }

  .rule-strategy-page .strategy-condition-item {
    grid-template-columns: 34px minmax(0, 1fr);
  }

  .rule-strategy-page .strategy-condition-item strong {
    grid-column: 1;
  }

  .rule-strategy-page .strategy-condition-right {
    grid-column: 2;
  }
}
</style>

<section class="page-panel rule-strategy-page">
  <h2>策略管理</h2>
  <p class="context-hint">统一管理结构化买卖策略。单标的回测已移至标的查看页。</p>

  <div class="strategy-toolbar">
    <div>
      <span class="strategy-toolbar-kicker">Rule Strategy</span>
      <strong>买入条件在左，卖出条件在右</strong>
    </div>
    <button id="newStrategyBtn" type="button">新增策略</button>
  </div>

  <p id="status" class="status-banner">加载中...</p>
  <div id="strategyGrid" class="strategy-list"></div>
</section>

<div id="strategyEditor" class="rule-strategy-modal" hidden>
  <div class="rule-strategy-dialog" role="dialog" aria-modal="true" aria-labelledby="strategyDialogTitle">
    <div class="rule-strategy-dialog-head">
      <div>
        <h3 id="strategyDialogTitle">新增策略</h3>
        <p class="context-hint">填写策略名称，系统自动生成策略 ID。买入条件全部满足（AND），卖出条件任一满足（OR）。</p>
        <p id="strategyEditorMeta" class="rule-strategy-editor-meta" hidden></p>
      </div>
      <button id="closeStrategyBtn" type="button" class="ghost-btn">关闭</button>
    </div>

    <label class="rule-strategy-name-field">策略名称
      <input id="newStrategyName" type="text" placeholder="例如：收盘价上穿/跌破 SMA60">
    </label>

    <div class="rule-condition-stack">
      <div class="rule-condition-panel">
        <div class="rule-condition-head">
          <h4>买入条件（全部满足）</h4>
          <button id="addEntryConditionBtn" type="button" class="ghost-btn">+ 条件</button>
        </div>
        <div id="entryConditions"></div>
      </div>
      <div class="rule-condition-panel">
        <div class="rule-condition-head">
          <h4>卖出条件（任一满足）</h4>
          <button id="addExitConditionBtn" type="button" class="ghost-btn">+ 条件</button>
        </div>
        <div id="exitConditions"></div>
      </div>
    </div>

    <div class="rule-strategy-dialog-actions">
      <span id="strategySaveStatus"></span>
      <button id="cancelStrategyBtn" type="button" class="ghost-btn">取消</button>
      <button id="saveStrategyBtn" type="button">保存策略</button>
    </div>
  </div>
</div>

<div id="strategyDeleteConfirm" class="rule-strategy-modal" hidden>
  <div class="rule-strategy-dialog strategy-delete-dialog" role="alertdialog" aria-modal="true" aria-labelledby="strategyDeleteTitle">
    <div class="rule-strategy-dialog-head">
      <div>
        <h3 id="strategyDeleteTitle">删除策略</h3>
        <p class="context-hint">删除后不可恢复，请再次确认。</p>
      </div>
      <button id="closeDeleteBtn" type="button" class="ghost-btn">关闭</button>
    </div>
    <p id="strategyDeleteText" class="strategy-delete-text"></p>
    <div class="rule-strategy-dialog-actions">
      <span id="strategyDeleteStatus"></span>
      <button id="cancelDeleteBtn" type="button" class="ghost-btn">取消</button>
      <button id="confirmDeleteBtn" type="button" class="strategy-danger-btn">确认删除</button>
    </div>
  </div>
</div>

<script>
let metaCache = { strategies: [], instruments: [], indicators: [], state_values: [], stop_defaults: {} };
let conditionSeq = 0;
let editingStrategyItem = null;
let copySourceItem = null;
const PRICE_FIELDS = ["open", "high", "low", "close", "volume", "amount"];
// Filled from /rule-backtest/api/meta (backend is the single source).
let STATE_VALUES = metaCache.state_values;
let STOP_DEFAULTS = metaCache.stop_defaults;

function esc(v) {
  return String(v ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

async function loadMeta() {
  const resp = await fetch("/rule-backtest/api/meta");
  if (!resp.ok) throw new Error(await resp.text());
  const meta = await resp.json();
  metaCache = meta;
  STATE_VALUES = meta.state_values || [];
  STOP_DEFAULTS = meta.stop_defaults || {};
  renderStrategyCards();
  document.getElementById("status").textContent = `共 ${meta.strategies?.length || 0} 个策略。`;
}

function indicatorLabel(name) {
  const item = (metaCache.indicators || []).find(x => x.id === name);
  return item?.label || name || "-";
}

function paramText(params) {
  const entries = Object.entries(params || {});
  return entries.length ? `(${entries.map(([k, v]) => `${k}=${v}`).join(", ")})` : "";
}

function valueText(value) {
  if (!value || typeof value !== "object") return "-";
  if (value.type === "price") return `价格.${value.field || "-"}`;
  if (value.type === "literal") return String(value.value ?? 0);
  if (value.type === "state_value") return `状态.${value.name || "-"}${paramText(value.params)}`;
  if (value.type === "indicator") return `${indicatorLabel(value.name)}${paramText(value.params)}`;
  return value.type || "-";
}

function conditionLines(group) {
  const children = Array.isArray(group?.children) ? group.children : [];
  if (!children.length) return '<li class="rule-empty-condition">暂无条件</li>';
  return children.map((item) => `
    <li>
      <span>${esc(valueText(item.left))}</span>
      <strong>${esc(item.operator || "")}</strong>
      <span>${esc(valueText(item.right))}</span>
    </li>
  `).join("");
}

function conditionCount(group) {
  return Array.isArray(group?.children) ? group.children.length : 0;
}

function conditionItems(group) {
  const children = Array.isArray(group?.children) ? group.children : [];
  if (!children.length) return '<li class="strategy-condition-empty">暂无条件</li>';
  return children.map((item, idx) => `
    <li class="strategy-condition-item">
      <span class="strategy-condition-index">${String(idx + 1).padStart(2, "0")}</span>
      <span class="strategy-condition-left">${esc(valueText(item.left))}</span>
      <strong>${esc(item.operator || "")}</strong>
      <span class="strategy-condition-right">${esc(valueText(item.right))}</span>
    </li>
  `).join("");
}

function renderStrategyCards() {
  const grid = document.getElementById("strategyGrid");
  const strategies = metaCache.strategies || [];
  if (!strategies.length) {
    grid.innerHTML = '<div class="content-panel">暂无策略。点击“新增策略”创建第一个规则策略。</div>';
    return;
  }
  grid.innerHTML = strategies.map((item) => {
    const strategy = item.strategy || {};
    return `
      <article class="strategy-row ${item.valid ? "" : "is-invalid"}">
        <header class="strategy-row-head">
          <div class="strategy-row-title">
            <h3>${esc(item.name || item.id)}</h3>
            <p>${esc(item.description || "无描述")}</p>
          </div>
          <div class="strategy-row-meta">
            <span class="strategy-card-badge">${esc(item.valid ? item.storage || "strategy" : "配置错误")}</span>
            <span>ID：${esc(item.id)}</span>
            <span>${esc(item.updated_at || item.created_at || "")}</span>
          </div>
          <div class="strategy-row-actions">
            <button type="button" class="ghost-btn strategy-edit-btn" data-strategy-id="${esc(item.id)}" title="编辑策略">编辑</button>
            <button type="button" class="ghost-btn strategy-copy-btn" data-strategy-id="${esc(item.id)}" title="复制策略">复制</button>
            <button type="button" class="ghost-btn strategy-delete-btn" data-strategy-id="${esc(item.id)}" title="删除策略">删除</button>
          </div>
        </header>
        <div class="strategy-row-rules">
          <div class="strategy-rule-panel strategy-rule-panel-buy">
            <div class="strategy-rule-panel-head">
              <span class="rule-side-label">买入条件 <em>AND</em></span>
              <span>${conditionCount(strategy.entry)} 条</span>
            </div>
            <ol class="strategy-condition-list">${conditionItems(strategy.entry)}</ol>
          </div>
          <div class="strategy-rule-panel strategy-rule-panel-sell">
            <div class="strategy-rule-panel-head">
              <span class="rule-side-label">卖出条件 <em>OR</em></span>
              <span>${conditionCount(strategy.exit)} 条</span>
            </div>
            <ol class="strategy-condition-list">${conditionItems(strategy.exit)}</ol>
          </div>
        </div>
        ${item.errors?.length ? `<p class="strategy-card-error">${esc(item.errors.join("；"))}</p>` : ""}
      </article>
    `;
  }).join("");
}

function indicatorOptions() {
  return (metaCache.indicators || [])
    .map(item => `<option value="${item.id}">${item.label || item.id}</option>`)
    .join("");
}

function fieldOptions(selected = "close") {
  return PRICE_FIELDS.map(f => `<option value="${f}" ${f === selected ? "selected" : ""}>${f}</option>`).join("");
}

function stateOptions(selected = "hard_stop") {
  return STATE_VALUES.map(v => `<option value="${v}" ${v === selected ? "selected" : ""}>${v}</option>`).join("");
}

function addCondition(side, condition = null) {
  const id = `cond_${++conditionSeq}`;
  const wrap = document.createElement("div");
  wrap.className = "rule-condition-row";
  wrap.dataset.conditionId = id;
  wrap.innerHTML = `
    <div class="rule-value-editor" data-side="left">
      ${valueEditorHtml("left")}
    </div>
    <select class="rule-operator">
      <option value=">=">&gt;=</option>
      <option value="<=">&lt;=</option>
    </select>
    <div class="rule-value-editor" data-side="right">
      ${valueEditorHtml("right")}
    </div>
    <button type="button" class="ghost-btn rule-remove-condition">删除</button>
  `;
  document.getElementById(side === "entry" ? "entryConditions" : "exitConditions").appendChild(wrap);
  bindConditionRow(wrap);
  if (condition) setConditionRowValue(wrap, condition);
}

function valueEditorHtml(side) {
  return `
    <select class="value-type">
      <option value="price">价格字段</option>
      <option value="indicator">指标</option>
      <option value="state_value">状态值</option>
      <option value="literal">常数</option>
    </select>
    <div class="value-detail"></div>
  `;
}

function bindConditionRow(row) {
  row.querySelector(".rule-remove-condition").addEventListener("click", () => row.remove());
  for (const editor of row.querySelectorAll(".rule-value-editor")) {
    const typeEl = editor.querySelector(".value-type");
    typeEl.addEventListener("change", () => renderValueDetail(editor));
    renderValueDetail(editor);
  }
}

function renderValueDetail(editor) {
  const type = editor.querySelector(".value-type").value;
  const detail = editor.querySelector(".value-detail");
  if (type === "price") {
    detail.innerHTML = `<select class="value-field">${fieldOptions("close")}</select>`;
  } else if (type === "literal") {
    detail.innerHTML = `<input class="value-literal" type="number" value="0" step="0.0001">`;
  } else if (type === "state_value") {
    detail.innerHTML = `
      <select class="value-state">${stateOptions("hard_stop")}</select>
      <span class="state-params"></span>
    `;
    const stateEl = detail.querySelector(".value-state");
    stateEl.addEventListener("change", () => renderStateParams(detail));
    renderStateParams(detail);
  } else {
    detail.innerHTML = `
      <select class="value-indicator">${indicatorOptions()}</select>
      <span class="indicator-params"></span>
    `;
    const indicatorEl = detail.querySelector(".value-indicator");
    indicatorEl.addEventListener("change", () => renderIndicatorParams(detail));
    renderIndicatorParams(detail);
  }
}

function setValueParams(container, params = {}) {
  for (const el of container.querySelectorAll("[data-param]")) {
    if (Object.prototype.hasOwnProperty.call(params, el.dataset.param)) {
      el.value = params[el.dataset.param] ?? "";
    }
  }
}

function setValueEditor(editor, value = {}) {
  const type = value?.type || "price";
  const typeEl = editor.querySelector(".value-type");
  typeEl.value = ["price", "indicator", "state_value", "literal"].includes(type) ? type : "price";
  renderValueDetail(editor);
  if (typeEl.value === "price") {
    const fieldEl = editor.querySelector(".value-field");
    if (fieldEl && value.field) fieldEl.value = value.field;
    return;
  }
  if (typeEl.value === "literal") {
    const literalEl = editor.querySelector(".value-literal");
    if (literalEl) literalEl.value = value.value ?? 0;
    return;
  }
  if (typeEl.value === "state_value") {
    const stateEl = editor.querySelector(".value-state");
    if (stateEl && value.name) stateEl.value = value.name;
    renderStateParams(editor.querySelector(".value-detail"));
    setValueParams(editor, value.params || {});
    return;
  }
  const indicatorEl = editor.querySelector(".value-indicator");
  if (indicatorEl && value.name) indicatorEl.value = value.name;
  renderIndicatorParams(editor.querySelector(".value-detail"));
  setValueParams(editor, value.params || {});
}

function setConditionRowValue(row, condition = {}) {
  const operatorEl = row.querySelector(".rule-operator");
  operatorEl.value = condition.operator === "<=" ? "<=" : ">=";
  setValueEditor(row.querySelector('.rule-value-editor[data-side="left"]'), condition.left || {});
  setValueEditor(row.querySelector('.rule-value-editor[data-side="right"]'), condition.right || {});
}

function renderStateParams(detail) {
  const name = detail.querySelector(".value-state").value;
  const target = detail.querySelector(".state-params");
  const defaults = STOP_DEFAULTS[name] || {};
  if (name === "hard_stop" || name === "chandelier_stop") {
    target.innerHTML = `
      <label>ATR <input data-param="atr_period" type="number" value="${defaults.atr_period ?? 20}" min="1" step="1"></label>
      <label>倍数 <input data-param="atr_mul" type="number" value="${defaults.atr_mul ?? 2.5}" step="0.1"></label>
    `;
  } else {
    target.innerHTML = "";
  }
}

function renderIndicatorParams(detail) {
  const id = detail.querySelector(".value-indicator").value;
  const indicator = (metaCache.indicators || []).find(x => x.id === id);
  const params = indicator?.params || {};
  const target = detail.querySelector(".indicator-params");
  target.innerHTML = Object.entries(params).map(([name, spec]) => {
    const value = spec.default ?? (spec.type === "price_field" ? "close" : "");
    if (spec.type === "price_field") {
      return `<label>${name} <select data-param="${name}">${fieldOptions(value)}</select></label>`;
    }
    const step = spec.type === "int" ? "1" : "0.0001";
    return `<label>${name} <input data-param="${name}" type="number" value="${value}" min="${spec.min ?? ""}" step="${step}"></label>`;
  }).join(" ");
}

function collectValue(editor) {
  const type = editor.querySelector(".value-type").value;
  if (type === "price") {
    return { type: "price", field: editor.querySelector(".value-field").value };
  }
  if (type === "literal") {
    return { type: "literal", value: Number(editor.querySelector(".value-literal").value || 0) };
  }
  if (type === "state_value") {
    const name = editor.querySelector(".value-state").value;
    const params = {};
    for (const el of editor.querySelectorAll("[data-param]")) {
      params[el.dataset.param] = Number(el.value);
    }
    return Object.keys(params).length ? { type: "state_value", name, params } : { type: "state_value", name };
  }
  const name = editor.querySelector(".value-indicator").value;
  const params = {};
  for (const el of editor.querySelectorAll("[data-param]")) {
    const raw = el.value;
    if (el.tagName !== "SELECT" && raw === "") continue;  // 留空 = 不传该参数（如 random_uniform 的 seed）
    params[el.dataset.param] = el.tagName === "SELECT" ? raw : Number(raw);
  }
  return { type: "indicator", name, params };
}

function collectConditions(containerId) {
  return [...document.getElementById(containerId).querySelectorAll(".rule-condition-row")].map((row, idx) => ({
    id: `${containerId}_${idx + 1}`,
    type: "condition",
    left: collectValue(row.querySelector('.rule-value-editor[data-side="left"]')),
    operator: row.querySelector(".rule-operator").value,
    right: collectValue(row.querySelector('.rule-value-editor[data-side="right"]'))
  }));
}

function buildStrategyFromEditor() {
  const name = document.getElementById("newStrategyName").value.trim();
  if (!name) throw new Error("策略名称不能为空");
  const base = editingStrategyItem?.strategy ? { ...editingStrategyItem.strategy } : {};
  return {
    ...base,
    schema_version: base.schema_version || 1,
    name,
    trade_mode: base.trade_mode || "single_symbol_all_in",
    entry: { type: "group", combinator: "all", children: collectConditions("entryConditions") },
    exit: { type: "group", combinator: "any", children: collectConditions("exitConditions") }
  };
}

function valuesEqual(a, b) {
  const ta = a?.type || "";
  const tb = b?.type || "";
  if (ta !== tb) return false;
  if (ta === "price") return (a?.field || "") === (b?.field || "");
  if (ta === "literal") return Number(a?.value ?? 0) === Number(b?.value ?? 0);
  if (ta === "state_value") {
    if ((a?.name || "") !== (b?.name || "")) return false;
    const pa = a?.params || {};
    const pb = b?.params || {};
    const keysA = Object.keys(pa).sort();
    const keysB = Object.keys(pb).sort();
    return keysA.join(",") === keysB.join(",") && keysA.every(k => Number(pa[k]) === Number(pb[k]));
  }
  if (ta === "indicator") {
    if ((a?.name || "") !== (b?.name || "")) return false;
    const pa = a?.params || {};
    const pb = b?.params || {};
    const keysA = Object.keys(pa).sort();
    const keysB = Object.keys(pb).sort();
    return keysA.join(",") === keysB.join(",") && keysA.every(k => {
      const va = pa[k];
      const vb = pb[k];
      if (typeof va === "number" && typeof vb === "number") return va === vb;
      return String(va) === String(vb);
    });
  }
  return false;
}

function conditionsEqual(listA, listB) {
  if (!Array.isArray(listA) && !Array.isArray(listB)) return true;
  if (!Array.isArray(listA) || !Array.isArray(listB)) return false;
  if (listA.length !== listB.length) return false;
  return listA.every((cond, idx) => {
    const other = listB[idx];
    return (cond?.operator || "") === (other?.operator || "")
      && valuesEqual(cond?.left, other?.left)
      && valuesEqual(cond?.right, other?.right);
  });
}

async function saveStrategy() {
  const status = document.getElementById("strategySaveStatus");
  let strategy;
  try {
    strategy = buildStrategyFromEditor();
  } catch (err) {
    status.textContent = err.message;
    return;
  }

  // Copy-mode validation: check that at least one condition has changed
  if (copySourceItem) {
    const srcStrategy = copySourceItem.strategy || {};
    const srcEntry = Array.isArray(srcStrategy.entry?.children) ? srcStrategy.entry.children : [];
    const srcExit = Array.isArray(srcStrategy.exit?.children) ? srcStrategy.exit.children : [];
    const newEntry = strategy.entry?.children || [];
    const newExit = strategy.exit?.children || [];
    const entryUnchanged = conditionsEqual(newEntry, srcEntry);
    const exitUnchanged = conditionsEqual(newExit, srcExit);
    if (entryUnchanged && exitUnchanged) {
      status.textContent = "复制策略时，买入或卖出条件至少有一处需要修改，当前条件与原策略完全相同。";
      return;
    }
  }

  status.textContent = "保存中...";
  const resp = await fetch("/rule-backtest/api/strategies", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ strategy, overwrite: Boolean(editingStrategyItem) })
  });
  if (!resp.ok) {
    status.textContent = `保存失败：${await resp.text()}`;
    return;
  }
  const saved = await resp.json();
  status.textContent = `已保存：${saved.id}`;
  await loadMeta();
  closeStrategyModal();
}

function resetStrategyEditor() {
  editingStrategyItem = null;
  copySourceItem = null;
  document.getElementById("strategyDialogTitle").textContent = "新增策略";
  document.getElementById("saveStrategyBtn").textContent = "保存策略";
  document.getElementById("strategyEditorMeta").hidden = true;
  document.getElementById("strategyEditorMeta").textContent = "";
  document.getElementById("newStrategyName").value = "";
  document.getElementById("strategySaveStatus").textContent = "";
  document.getElementById("entryConditions").innerHTML = "";
  document.getElementById("exitConditions").innerHTML = "";
  addCondition("entry");
  addCondition("exit");
}

function fillConditions(containerId, side, group) {
  document.getElementById(containerId).innerHTML = "";
  const children = Array.isArray(group?.children) ? group.children : [];
  if (!children.length) {
    addCondition(side);
    return;
  }
  children.forEach((condition) => addCondition(side, condition));
}

function openStrategyModal(item = null) {
  resetStrategyEditor();
  if (item) {
    editingStrategyItem = item;
    const strategy = item.strategy || {};
    document.getElementById("strategyDialogTitle").textContent = "编辑策略";
    document.getElementById("saveStrategyBtn").textContent = "保存修改";
    document.getElementById("newStrategyName").value = item.name || strategy.name || item.id || "";
    const meta = document.getElementById("strategyEditorMeta");
    meta.textContent = `ID：${item.id} · 存储：${item.storage || "strategy"}`;
    meta.hidden = false;
    fillConditions("entryConditions", "entry", strategy.entry);
    fillConditions("exitConditions", "exit", strategy.exit);
    document.getElementById("strategySaveStatus").textContent = "";
  }
  document.getElementById("strategyEditor").hidden = false;
  document.body.classList.add("modal-open");
  requestAnimationFrame(() => document.getElementById("newStrategyName").focus());
}

function openCopyStrategyModal(sourceItem) {
  resetStrategyEditor();
  copySourceItem = sourceItem;
  const strategy = sourceItem.strategy || {};
  const srcName = sourceItem.name || strategy.name || sourceItem.id || "";
  document.getElementById("strategyDialogTitle").textContent = "复制策略";
  document.getElementById("saveStrategyBtn").textContent = "保存副本";
  document.getElementById("newStrategyName").value = srcName + " (副本)";
  const meta = document.getElementById("strategyEditorMeta");
  meta.textContent = `基于：${sourceItem.id} · 原存储：${sourceItem.storage || "strategy"}`;
  meta.hidden = false;
  fillConditions("entryConditions", "entry", strategy.entry);
  fillConditions("exitConditions", "exit", strategy.exit);
  document.getElementById("strategySaveStatus").textContent = "";
  document.getElementById("strategyEditor").hidden = false;
  document.body.classList.add("modal-open");
  requestAnimationFrame(() => document.getElementById("newStrategyName").select());
}

function closeStrategyModal() {
  document.getElementById("strategyEditor").hidden = true;
  document.body.classList.remove("modal-open");
}

let deletingStrategyItem = null;

function openDeleteConfirm(item) {
  deletingStrategyItem = item;
  document.getElementById("strategyDeleteText").textContent =
    `确定要删除策略「${item.name || item.id}」（ID：${item.id}）吗？删除后不可恢复。`;
  document.getElementById("strategyDeleteStatus").textContent = "";
  document.getElementById("confirmDeleteBtn").disabled = false;
  document.getElementById("strategyDeleteConfirm").hidden = false;
  document.body.classList.add("modal-open");
  requestAnimationFrame(() => document.getElementById("confirmDeleteBtn").focus());
}

function closeDeleteConfirm() {
  deletingStrategyItem = null;
  document.getElementById("strategyDeleteConfirm").hidden = true;
  document.body.classList.remove("modal-open");
}

async function confirmDeleteStrategy() {
  if (!deletingStrategyItem) return;
  const status = document.getElementById("strategyDeleteStatus");
  const btn = document.getElementById("confirmDeleteBtn");
  status.textContent = "删除中...";
  btn.disabled = true;
  try {
    const resp = await fetch(`/rule-backtest/api/strategies/${encodeURIComponent(deletingStrategyItem.id)}`, {
      method: "DELETE"
    });
    if (!resp.ok) {
      status.textContent = `删除失败：${await resp.text()}`;
      return;
    }
    closeDeleteConfirm();
    await loadMeta();
  } catch (err) {
    status.textContent = `删除失败：${err.message}`;
  } finally {
    btn.disabled = false;
  }
}

document.getElementById("newStrategyBtn").addEventListener("click", () => openStrategyModal());
document.getElementById("strategyGrid").addEventListener("click", (event) => {
  const editBtn = event.target.closest(".strategy-edit-btn");
  if (editBtn) {
    const item = (metaCache.strategies || []).find(x => String(x.id) === String(editBtn.dataset.strategyId));
    if (item) openStrategyModal(item);
    return;
  }
  const copyBtn = event.target.closest(".strategy-copy-btn");
  if (copyBtn) {
    const item = (metaCache.strategies || []).find(x => String(x.id) === String(copyBtn.dataset.strategyId));
    if (item) openCopyStrategyModal(item);
    return;
  }
  const deleteBtn = event.target.closest(".strategy-delete-btn");
  if (deleteBtn) {
    const item = (metaCache.strategies || []).find(x => String(x.id) === String(deleteBtn.dataset.strategyId));
    if (item) openDeleteConfirm(item);
    return;
  }
});
document.getElementById("addEntryConditionBtn").addEventListener("click", () => addCondition("entry"));
document.getElementById("addExitConditionBtn").addEventListener("click", () => addCondition("exit"));
document.getElementById("saveStrategyBtn").addEventListener("click", saveStrategy);
document.getElementById("cancelStrategyBtn").addEventListener("click", closeStrategyModal);
document.getElementById("closeStrategyBtn").addEventListener("click", closeStrategyModal);
document.getElementById("strategyEditor").addEventListener("click", (event) => {
  if (event.target.id === "strategyEditor") closeStrategyModal();
});
document.getElementById("cancelDeleteBtn").addEventListener("click", closeDeleteConfirm);
document.getElementById("closeDeleteBtn").addEventListener("click", closeDeleteConfirm);
document.getElementById("confirmDeleteBtn").addEventListener("click", confirmDeleteStrategy);
document.getElementById("strategyDeleteConfirm").addEventListener("click", (event) => {
  if (event.target.id === "strategyDeleteConfirm") closeDeleteConfirm();
});
document.addEventListener("keydown", (event) => {
  if (event.key !== "Escape") return;
  if (!document.getElementById("strategyDeleteConfirm").hidden) {
    closeDeleteConfirm();
    return;
  }
  if (!document.getElementById("strategyEditor").hidden) closeStrategyModal();
});
loadMeta().catch(err => {
  document.getElementById("status").textContent = `加载失败：${err.message}`;
});
</script>
{% endblock %}
