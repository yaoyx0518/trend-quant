{% extends "base.html" %}
{% block content %}
<section class="page-panel">
  <h2>策略管理</h2>
  <p class="context-hint">统一管理结构化买卖策略。单标的回测已移至标的查看页。</p>

  <div class="bt-form-row rule-main-row">
    <button id="newStrategyBtn" type="button" class="ghost-btn">新增策略</button>
  </div>

  <div id="strategyEditor" class="rule-strategy-modal" hidden>
    <div class="rule-strategy-dialog" role="dialog" aria-modal="true" aria-labelledby="strategyDialogTitle">
      <div class="rule-strategy-dialog-head">
        <div>
          <h3 id="strategyDialogTitle">新增策略</h3>
          <p class="context-hint">填写策略名称，系统自动生成策略 ID。买入条件和卖出条件均为全部满足。</p>
        </div>
        <button id="closeStrategyBtn" type="button" class="ghost-btn">关闭</button>
      </div>

      <label class="rule-strategy-name-field">策略名称
        <input id="newStrategyName" type="text" placeholder="例如：收盘价上穿/跌破 SMA60">
      </label>

      <div class="rule-condition-stack">
        <div class="rule-condition-panel">
          <div class="rule-condition-head">
            <h4>买入条件（全部满足）</h4>
            <button id="addEntryConditionBtn" type="button" class="ghost-btn">+ 条件</button>
          </div>
          <div id="entryConditions"></div>
        </div>
        <div class="rule-condition-panel">
          <div class="rule-condition-head">
            <h4>卖出条件（全部满足）</h4>
            <button id="addExitConditionBtn" type="button" class="ghost-btn">+ 条件</button>
          </div>
          <div id="exitConditions"></div>
        </div>
      </div>

      <div class="rule-strategy-dialog-actions">
        <span id="strategySaveStatus"></span>
        <button id="cancelStrategyBtn" type="button" class="ghost-btn">取消</button>
        <button id="saveStrategyBtn" type="button">保存策略</button>
      </div>
    </div>
  </div>

  <p id="status" class="status-banner">加载中...</p>
  <div id="strategyGrid" class="strategy-card-grid"></div>
</section>

<script>
let metaCache = { strategies: [], instruments: [], indicators: [] };
let conditionSeq = 0;
const PRICE_FIELDS = ["open", "high", "low", "close", "volume", "amount"];
const STATE_VALUES = ["entry_price", "hard_stop", "highest_high_since_entry", "chandelier_stop"];

function esc(v) {
  return String(v ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

async function loadMeta() {
  const resp = await fetch("/rule-backtest/api/meta");
  if (!resp.ok) throw new Error(await resp.text());
  const meta = await resp.json();
  metaCache = meta;
  renderStrategyCards();
  document.getElementById("status").textContent = `共 ${meta.strategies?.length || 0} 个策略。`;
}

function indicatorLabel(name) {
  const item = (metaCache.indicators || []).find(x => x.id === name);
  return item?.label || name || "-";
}

function paramText(params) {
  const entries = Object.entries(params || {});
  return entries.length ? `(${entries.map(([k, v]) => `${k}=${v}`).join(", ")})` : "";
}

function valueText(value) {
  if (!value || typeof value !== "object") return "-";
  if (value.type === "price") return `价格.${value.field || "-"}`;
  if (value.type === "literal") return String(value.value ?? 0);
  if (value.type === "state_value") return `状态.${value.name || "-"}${paramText(value.params)}`;
  if (value.type === "indicator") return `${indicatorLabel(value.name)}${paramText(value.params)}`;
  return value.type || "-";
}

function conditionLines(group) {
  const children = Array.isArray(group?.children) ? group.children : [];
  if (!children.length) return '<li class="rule-empty-condition">暂无条件</li>';
  return children.map((item) => `
    <li>
      <span>${esc(valueText(item.left))}</span>
      <strong>${esc(item.operator || "")}</strong>
      <span>${esc(valueText(item.right))}</span>
    </li>
  `).join("");
}

function renderStrategyCards() {
  const grid = document.getElementById("strategyGrid");
  const strategies = metaCache.strategies || [];
  if (!strategies.length) {
    grid.innerHTML = '<div class="content-panel">暂无策略。点击“新增策略”创建第一个规则策略。</div>';
    return;
  }
  grid.innerHTML = strategies.map((item) => {
    const strategy = item.strategy || {};
    return `
      <article class="strategy-card ${item.valid ? "" : "is-invalid"}">
        <div class="strategy-card-head">
          <div>
            <h3>${esc(item.name || item.id)}</h3>
            <p>${esc(item.description || "无描述")}</p>
          </div>
          <span class="strategy-card-badge">${esc(item.valid ? item.storage || "strategy" : "配置错误")}</span>
        </div>
        <div class="strategy-rule-columns">
          <section>
            <h4>买入条件</h4>
            <ul>${conditionLines(strategy.entry)}</ul>
          </section>
          <section>
            <h4>卖出条件</h4>
            <ul>${conditionLines(strategy.exit)}</ul>
          </section>
        </div>
        ${item.errors?.length ? `<p class="strategy-card-error">${esc(item.errors.join("；"))}</p>` : ""}
        <div class="strategy-card-foot">
          <span>ID：${esc(item.id)}</span>
          <span>${esc(item.updated_at || item.created_at || "")}</span>
        </div>
      </article>
    `;
  }).join("");
}

function indicatorOptions() {
  return (metaCache.indicators || [])
    .map(item => `<option value="${item.id}">${item.label || item.id}</option>`)
    .join("");
}

function fieldOptions(selected = "close") {
  return PRICE_FIELDS.map(f => `<option value="${f}" ${f === selected ? "selected" : ""}>${f}</option>`).join("");
}

function stateOptions(selected = "hard_stop") {
  return STATE_VALUES.map(v => `<option value="${v}" ${v === selected ? "selected" : ""}>${v}</option>`).join("");
}

function addCondition(side) {
  const id = `cond_${++conditionSeq}`;
  const wrap = document.createElement("div");
  wrap.className = "rule-condition-row";
  wrap.dataset.conditionId = id;
  wrap.innerHTML = `
    <div class="rule-value-editor" data-side="left">
      ${valueEditorHtml("left")}
    </div>
    <select class="rule-operator">
      <option value=">=">&gt;=</option>
      <option value="<=">&lt;=</option>
    </select>
    <div class="rule-value-editor" data-side="right">
      ${valueEditorHtml("right")}
    </div>
    <button type="button" class="ghost-btn rule-remove-condition">删除</button>
  `;
  document.getElementById(side === "entry" ? "entryConditions" : "exitConditions").appendChild(wrap);
  bindConditionRow(wrap);
}

function valueEditorHtml(side) {
  return `
    <select class="value-type">
      <option value="price">价格字段</option>
      <option value="indicator">指标</option>
      <option value="state_value">状态值</option>
      <option value="literal">常数</option>
    </select>
    <div class="value-detail"></div>
  `;
}

function bindConditionRow(row) {
  row.querySelector(".rule-remove-condition").addEventListener("click", () => row.remove());
  for (const editor of row.querySelectorAll(".rule-value-editor")) {
    const typeEl = editor.querySelector(".value-type");
    typeEl.addEventListener("change", () => renderValueDetail(editor));
    renderValueDetail(editor);
  }
}

function renderValueDetail(editor) {
  const type = editor.querySelector(".value-type").value;
  const detail = editor.querySelector(".value-detail");
  if (type === "price") {
    detail.innerHTML = `<select class="value-field">${fieldOptions("close")}</select>`;
  } else if (type === "literal") {
    detail.innerHTML = `<input class="value-literal" type="number" value="0" step="0.0001">`;
  } else if (type === "state_value") {
    detail.innerHTML = `
      <select class="value-state">${stateOptions("hard_stop")}</select>
      <span class="state-params"></span>
    `;
    const stateEl = detail.querySelector(".value-state");
    stateEl.addEventListener("change", () => renderStateParams(detail));
    renderStateParams(detail);
  } else {
    detail.innerHTML = `
      <select class="value-indicator">${indicatorOptions()}</select>
      <span class="indicator-params"></span>
    `;
    const indicatorEl = detail.querySelector(".value-indicator");
    indicatorEl.addEventListener("change", () => renderIndicatorParams(detail));
    renderIndicatorParams(detail);
  }
}

function renderStateParams(detail) {
  const name = detail.querySelector(".value-state").value;
  const target = detail.querySelector(".state-params");
  if (name === "hard_stop") {
    target.innerHTML = `
      <label>ATR <input data-param="atr_period" type="number" value="20" min="1" step="1"></label>
      <label>倍数 <input data-param="atr_mul" type="number" value="1.5" step="0.1"></label>
    `;
  } else if (name === "chandelier_stop") {
    target.innerHTML = `
      <label>ATR <input data-param="atr_period" type="number" value="20" min="1" step="1"></label>
      <label>倍数 <input data-param="atr_mul" type="number" value="2.5" step="0.1"></label>
    `;
  } else {
    target.innerHTML = "";
  }
}

function renderIndicatorParams(detail) {
  const id = detail.querySelector(".value-indicator").value;
  const indicator = (metaCache.indicators || []).find(x => x.id === id);
  const params = indicator?.params || {};
  const target = detail.querySelector(".indicator-params");
  target.innerHTML = Object.entries(params).map(([name, spec]) => {
    const value = spec.default ?? (spec.type === "price_field" ? "close" : "");
    if (spec.type === "price_field") {
      return `<label>${name} <select data-param="${name}">${fieldOptions(value)}</select></label>`;
    }
    const step = spec.type === "int" ? "1" : "0.0001";
    return `<label>${name} <input data-param="${name}" type="number" value="${value}" min="${spec.min ?? ""}" step="${step}"></label>`;
  }).join(" ");
}

function collectValue(editor) {
  const type = editor.querySelector(".value-type").value;
  if (type === "price") {
    return { type: "price", field: editor.querySelector(".value-field").value };
  }
  if (type === "literal") {
    return { type: "literal", value: Number(editor.querySelector(".value-literal").value || 0) };
  }
  if (type === "state_value") {
    const name = editor.querySelector(".value-state").value;
    const params = {};
    for (const el of editor.querySelectorAll("[data-param]")) {
      params[el.dataset.param] = Number(el.value);
    }
    return Object.keys(params).length ? { type: "state_value", name, params } : { type: "state_value", name };
  }
  const name = editor.querySelector(".value-indicator").value;
  const params = {};
  for (const el of editor.querySelectorAll("[data-param]")) {
    const raw = el.value;
    params[el.dataset.param] = el.tagName === "SELECT" ? raw : Number(raw);
  }
  return { type: "indicator", name, params };
}

function collectConditions(containerId) {
  return [...document.getElementById(containerId).querySelectorAll(".rule-condition-row")].map((row, idx) => ({
    id: `${containerId}_${idx + 1}`,
    type: "condition",
    left: collectValue(row.querySelector('.rule-value-editor[data-side="left"]')),
    operator: row.querySelector(".rule-operator").value,
    right: collectValue(row.querySelector('.rule-value-editor[data-side="right"]'))
  }));
}

function buildNewStrategy() {
  const name = document.getElementById("newStrategyName").value.trim();
  if (!name) throw new Error("策略名称不能为空");
  return {
    schema_version: 1,
    name,
    trade_mode: "single_symbol_all_in",
    entry: { type: "group", combinator: "all", children: collectConditions("entryConditions") },
    exit: { type: "group", combinator: "all", children: collectConditions("exitConditions") }
  };
}

async function saveStrategy() {
  const status = document.getElementById("strategySaveStatus");
  let strategy;
  try {
    strategy = buildNewStrategy();
  } catch (err) {
    status.textContent = err.message;
    return;
  }
  status.textContent = "保存中...";
  const resp = await fetch("/rule-backtest/api/strategies", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ strategy, overwrite: false })
  });
  if (!resp.ok) {
    status.textContent = `保存失败：${await resp.text()}`;
    return;
  }
  const saved = await resp.json();
  status.textContent = `已保存：${saved.id}`;
  await loadMeta();
  closeStrategyModal();
}

function resetStrategyEditor() {
  document.getElementById("newStrategyName").value = "";
  document.getElementById("strategySaveStatus").textContent = "";
  document.getElementById("entryConditions").innerHTML = "";
  document.getElementById("exitConditions").innerHTML = "";
  addCondition("entry");
  addCondition("exit");
}

function openStrategyModal() {
  resetStrategyEditor();
  document.getElementById("strategyEditor").hidden = false;
  document.body.classList.add("modal-open");
  requestAnimationFrame(() => document.getElementById("newStrategyName").focus());
}

function closeStrategyModal() {
  document.getElementById("strategyEditor").hidden = true;
  document.body.classList.remove("modal-open");
}

document.getElementById("newStrategyBtn").addEventListener("click", openStrategyModal);
document.getElementById("addEntryConditionBtn").addEventListener("click", () => addCondition("entry"));
document.getElementById("addExitConditionBtn").addEventListener("click", () => addCondition("exit"));
document.getElementById("saveStrategyBtn").addEventListener("click", saveStrategy);
document.getElementById("cancelStrategyBtn").addEventListener("click", closeStrategyModal);
document.getElementById("closeStrategyBtn").addEventListener("click", closeStrategyModal);
document.getElementById("strategyEditor").addEventListener("click", (event) => {
  if (event.target.id === "strategyEditor") closeStrategyModal();
});
document.addEventListener("keydown", (event) => {
  if (event.key === "Escape" && !document.getElementById("strategyEditor").hidden) closeStrategyModal();
});
loadMeta().catch(err => {
  document.getElementById("status").textContent = `加载失败：${err.message}`;
});
</script>
{% endblock %}
