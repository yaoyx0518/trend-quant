{% extends "base.html" %}
{% block content %}
<section class="page-panel instruments-page">
  <h2>标的管理</h2>
  <div class="bt-form-row">
    <button id="backfillAllBtn" type="button">一键补齐至今日</button>
  </div>
  <p id="instStatus" class="status-banner">正在加载标的...</p>
  <div class="table-shell">
    <table id="instTable">
      <thead>
        <tr>
          <th>代码</th>
          <th>标识</th>
          <th>名称</th>
          <th>启用</th>
          <th>数据行数</th>
          <th>日期范围</th>
          <th>补齐日 K</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</section>

<script>
(() => {
  const statusEl = document.getElementById('instStatus');
  const backfillAllBtn = document.getElementById('backfillAllBtn');
  const tableBody = document.querySelector('#instTable tbody');
  const today = localToday();
  let isBulkRunning = false;

  function esc(v) {
    return String(v ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function dateRangeText(start, end) {
    if (!start && !end) return '-';
    return `${start || '-'} ~ ${end || '-'}`;
  }

  function dateOnly(value) {
    const text = String(value || '').trim();
    const match = text.match(/^\d{4}-\d{2}-\d{2}/);
    return match ? match[0] : '';
  }

  function localToday() {
    const now = new Date();
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const day = String(now.getDate()).padStart(2, '0');
    return `${year}-${month}-${day}`;
  }

  function fmtNum(v) {
    const n = Number(v || 0);
    if (!Number.isFinite(n)) return '-';
    return n.toLocaleString();
  }

  function render(items) {
    if (!Array.isArray(items) || !items.length) {
      tableBody.innerHTML = '<tr><td colspan="7">未找到本地标的数据。</td></tr>';
      return;
    }

    tableBody.innerHTML = items.map((item) => {
      const symbol = String(item.symbol || '').trim();
      const localStart = dateOnly(item.local_start_date);
      const localEnd = dateOnly(item.local_end_date);
      const startDefault = localEnd || localStart || '2020-01-01';
      return `
        <tr
          data-symbol="${esc(symbol)}"
          data-local-start="${esc(localStart)}"
          data-local-end="${esc(localEnd)}"
        >
          <td>${esc(item.code || '')}</td>
          <td>${esc(symbol)}</td>
          <td>${esc(item.name || '-')}</td>
          <td>${item.enabled ? '是' : '否'}</td>
          <td data-role="rows">${fmtNum(item.rows)}</td>
          <td data-role="range">${esc(dateRangeText(localStart, localEnd))}</td>
          <td>
            <div class="bt-form-row" style="margin: 0; gap: 6px;">
              <input data-role="start" type="date" value="${esc(startDefault)}">
              <input data-role="end" type="date" value="${esc(today)}">
              <button data-role="backfill" type="button">补齐</button>
            </div>
            <div data-role="msg" style="font-size: 12px; color: #556; margin-top: 4px;"></div>
          </td>
        </tr>
      `;
    }).join('');
  }

  async function loadList() {
    statusEl.textContent = '正在加载标的...';
    try {
      const resp = await fetch('/instruments/api/list');
      const data = await resp.json();
      if (!resp.ok) {
        throw new Error(data.detail || '列表加载失败');
      }
      render(data.items || []);
      statusEl.textContent = `已加载 ${Number(data.count || 0)} 个标的。`;
    } catch (err) {
      statusEl.textContent = `加载失败：${err.message}`;
      tableBody.innerHTML = '<tr><td colspan="7">数据加载失败。</td></tr>';
    }
  }

  function setRowMessage(row, text, isError = false) {
    const msgEl = row.querySelector('[data-role="msg"]');
    if (!msgEl) return;
    msgEl.textContent = text;
    msgEl.style.color = isError ? '#b42318' : '#556';
  }

  function setBackfillControlsDisabled(disabled) {
    if (backfillAllBtn) backfillAllBtn.disabled = disabled;
    for (const btn of tableBody.querySelectorAll('button[data-role="backfill"]')) {
      btn.disabled = disabled;
    }
  }

  function nextStartDateForRow(row) {
    return String(row.dataset.localEnd || row.dataset.localStart || '2020-01-01').trim();
  }

  function refreshRowAfterBackfill(row, result) {
    const rowsEl = row.querySelector('[data-role="rows"]');
    const rangeEl = row.querySelector('[data-role="range"]');
    const startEl = row.querySelector('[data-role="start"]');
    const endEl = row.querySelector('[data-role="end"]');
    const localStart = dateOnly(result.local_start_after);
    const localEnd = dateOnly(result.local_end_after);

    if (rowsEl) rowsEl.textContent = fmtNum(result.rows_after);
    if (rangeEl) rangeEl.textContent = dateRangeText(localStart, localEnd);
    row.dataset.localStart = localStart;
    row.dataset.localEnd = localEnd;
    if (startEl) startEl.value = localEnd || localStart || '2020-01-01';
    if (endEl) endEl.value = today;
  }

  async function runBackfill(row, options = {}) {
    const symbol = String(row.dataset.symbol || '').trim();
    if (!symbol) return { ok: false, error: new Error('标的无效') };
    const startEl = row.querySelector('[data-role="start"]');
    const endEl = row.querySelector('[data-role="end"]');
    const btn = row.querySelector('[data-role="backfill"]');
    const startDate = String(startEl?.value || '').trim();
    const endDate = String(endEl?.value || '').trim();
    const restoreButton = options.restoreButton !== false;

    if (!startDate) {
      setRowMessage(row, '请输入开始日期。', true);
      return { ok: false, error: new Error('请输入开始日期') };
    }
    if (endDate && endDate < startDate) {
      setRowMessage(row, '结束日期必须大于等于开始日期。', true);
      return { ok: false, error: new Error('结束日期必须大于等于开始日期') };
    }

    if (btn) btn.disabled = true;
    setRowMessage(row, '正在补齐...');
    try {
      const resp = await fetch(`/instruments/api/${encodeURIComponent(symbol)}/backfill`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          start_date: startDate,
          end_date: endDate,
        }),
      });
      const data = await resp.json();
      if (!resp.ok || !data.ok) {
        throw new Error(data.detail || '补齐失败');
      }

      const result = data.result || {};
      refreshRowAfterBackfill(row, result);

      if (result.status === 'no_data') {
        setRowMessage(
          row,
          `未获取到数据。本地范围仍为 ${dateRangeText(result.local_start_after, result.local_end_after)}，请检查行情源连接或稍后重试。`,
          true
        );
        return { ok: false, noData: true, result };
      }

      const adjusted = Boolean(result.request_adjusted_to_earliest_available);
      const adjustedText = adjusted
        ? ` 请求开始日期已调整为最早可用日期 ${result.fetched_start || '-'}。`
        : '';
      setRowMessage(
        row,
        `完成。新增 ${Number(result.added_rows || 0)} 行，本地范围 ${dateRangeText(result.local_start_after, result.local_end_after)}。${adjustedText}`
      );
      return { ok: true, result };
    } catch (err) {
      setRowMessage(row, `失败：${err.message}`, true);
      return { ok: false, error: err };
    } finally {
      if (btn && restoreButton) btn.disabled = false;
    }
  }

  async function runBackfillAll() {
    if (isBulkRunning) return;

    const rows = Array.from(tableBody.querySelectorAll('tr[data-symbol]'));
    if (!rows.length) {
      statusEl.textContent = '没有可补齐的标的。';
      return;
    }

    isBulkRunning = true;
    setBackfillControlsDisabled(true);

    let finished = 0;
    let failed = 0;
    let noData = 0;
    let addedRows = 0;
    statusEl.textContent = `准备补齐 ${rows.length} 个标的，范围为各标的最后一天至 ${today}。`;

    try {
      for (const row of rows) {
        const symbol = String(row.dataset.symbol || '').trim();
        const start = nextStartDateForRow(row);
        const startEl = row.querySelector('[data-role="start"]');
        const endEl = row.querySelector('[data-role="end"]');
        if (startEl) startEl.value = start;
        if (endEl) endEl.value = today;

        statusEl.textContent = `正在补齐 ${symbol}（${finished + 1}/${rows.length}）：${start} 至 ${today}`;
        const outcome = await runBackfill(row, { restoreButton: false });
        finished += 1;
        if (outcome.ok) {
          addedRows += Number(outcome.result?.added_rows || 0);
        } else if (outcome.noData) {
          noData += 1;
        } else {
          failed += 1;
        }
      }

      statusEl.textContent = `一键补齐结束：共 ${rows.length} 个标的，未获取到数据 ${noData} 个，失败 ${failed} 个，新增 ${addedRows.toLocaleString()} 行。`;
    } finally {
      isBulkRunning = false;
      setBackfillControlsDisabled(false);
    }
  }

  tableBody.addEventListener('click', async (event) => {
    const target = event.target;
    if (!(target instanceof HTMLElement)) return;
    if (target.getAttribute('data-role') !== 'backfill') return;
    if (isBulkRunning) return;
    const row = target.closest('tr');
    if (!row) return;
    await runBackfill(row);
  });

  backfillAllBtn?.addEventListener('click', runBackfillAll);

  loadList();
})();
</script>
{% endblock %}
