{% extends "base.html" %}
{% block content %}
<section class="index-board-page">
  <header class="index-board-hero">
    <div>
      <p class="index-board-kicker">SUBJECT MARKET / DAILY</p>
      <h1>标的看板</h1>
      <p>默认展示一级类目下的二级类目聚合。点击二级类目展开三级类目，再点击三级类目展开具体标的；所有聚合均按每个交易日的成交额加权。</p>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:10px;">
      <div class="index-board-legend"><span class="dot positive"></span>强势 <span class="dot negative"></span>弱势</div>
      <button id="intradayBtn" class="intraday-btn" disabled title="仅交易时段可用">🟠 获取盘中实时看板</button>
    </div>
  </header>
  <section id="heatmapPanel" class="heatmap-panel" hidden>
    <div class="heatmap-head">
      <div id="heatmapTabs" class="heatmap-tabs" role="tablist" aria-label="一级类目切换"></div>
      <div class="heatmap-legend" aria-hidden="true">
        <span class="heatmap-legend-label">下跌</span>
        <span class="heatmap-legend-bar"></span>
        <span class="heatmap-legend-label">上涨</span>
        <span class="heatmap-legend-na"></span>
        <span class="heatmap-legend-label">数据不足</span>
      </div>
    </div>
    <div id="heatmapChart" class="heatmap-chart"></div>
    <p class="heatmap-note">面积 = 近20日平均成交额（盘中模式按当日成交额） · 颜色 = 最新趋势值 MA5（红涨绿跌） · 点击色块下钻，底部面包屑返回 · 悬停查看详情</p>
  </section>
  <div id="intradayProgress" class="intraday-progress-wrap" hidden>
    <progress id="intradayProgressBar" max="100" value="0" aria-label="盘中计算进度"></progress>
    <span id="intradayProgressText">准备中…</span>
  </div>
  <div id="subjectBoardStatus" class="context-hint">正在按类目层级汇总本地标的日K数据…</div>
  <div id="subjectBoard" class="index-board"></div>
</section>
<script src="/static/echarts.min.js?v={{ request.app.state.asset_version|default('1', true) if request is defined else '1' }}"></script>
<script>
  const board = document.getElementById('subjectBoard');
  const statusEl = document.getElementById('subjectBoardStatus');
  const intradayBtn = document.getElementById('intradayBtn');
  const intradayProgress = document.getElementById('intradayProgress');
  const intradayProgressBar = document.getElementById('intradayProgressBar');
  const intradayProgressText = document.getElementById('intradayProgressText');
  let nodeSequence = 0;
  let isIntradayMode = false;
  const fmtAmount = (value) => {
    if (value == null || !Number.isFinite(value)) return '—';
    if (Math.abs(value) >= 1e8) return `${(value / 1e8).toFixed(1)}亿`;
    if (Math.abs(value) >= 1e4) return `${(value / 1e4).toFixed(0)}万`;
    return value.toFixed(0);
  };
  const fmtScore = (value) => value == null ? '—' : value.toFixed(1);
  const fmtChange = (value) => value == null ? '—' : `${value >= 0 ? '+' : ''}${value.toFixed(2)}%`;
  const getChangeClass = (value) => value != null && value >= 0 ? 'is-positive' : 'is-negative';
  const fmtPhase = (item) => {
    if (item.trend_phase == null || item.trend_phase_days == null) return '<span class="index-phase-na">—</span>';
    const phaseLabel = item.trend_phase === 'start' ? '趋势启动' : '趋势结束';
    const phaseClass = item.trend_phase === 'start' ? 'is-positive' : 'is-negative';
    const changeVal = item.trend_phase_change_pct != null ? item.trend_phase_change_pct.toFixed(2) : '—';
    const changeSign = item.trend_phase_change_pct != null && item.trend_phase_change_pct >= 0 ? '+' : '';
    const changeClass = item.trend_phase_change_pct != null ? (item.trend_phase_change_pct >= 0 ? 'is-positive' : 'is-negative') : '';
    return `<span class="${phaseClass}">${phaseLabel}第 ${item.trend_phase_days} 天</span>，涨跌幅：<span class="${changeClass}">${changeSign}${changeVal}%</span>`;
  };

  // ---- 类目热力图（Treemap）------------------------------------------------
  const heatmapPanel = document.getElementById('heatmapPanel');
  const heatmapTabsEl = document.getElementById('heatmapTabs');
  const heatmapChartEl = document.getElementById('heatmapChart');
  let heatmapChart = null;
  let heatmapPayload = null;
  let heatmapActiveL1 = null;
  let heatmapResizeTimer = null;

  const escHtml = (value) => String(value ?? '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');

  // 柔和的红/绿渐变档位（趋势 MA5 绝对值 → RGB），最深不超过末档，避免刺眼。
  const HEAT_STOPS_UP = [[0, [250, 236, 234]], [2.5, [241, 203, 198]], [5, [228, 161, 154]], [10, [211, 105, 97]], [20, [191, 63, 57]]];
  const HEAT_STOPS_DOWN = [[0, [232, 241, 237]], [2.5, [198, 227, 215]], [5, [152, 205, 183]], [10, [96, 174, 143]], [20, [27, 126, 96]]];

  function heatInterpolate(stops, value) {
    const x = Math.min(Math.max(value, 0), stops[stops.length - 1][0]);
    for (let i = 1; i < stops.length; i += 1) {
      if (x <= stops[i][0]) {
        const [x0, c0] = stops[i - 1];
        const [x1, c1] = stops[i];
        const t = x1 === x0 ? 0 : (x - x0) / (x1 - x0);
        return c0.map((a, k) => Math.round(a + (c1[k] - a) * t));
      }
    }
    return stops[stops.length - 1][1];
  }

  function heatColor(ma5) {
    if (ma5 == null || !Number.isFinite(ma5)) return { fill: '#e6eaee', text: '#6b7280' };
    const abs = Math.abs(ma5);
    const rgb = heatInterpolate(ma5 >= 0 ? HEAT_STOPS_UP : HEAT_STOPS_DOWN, abs);
    return { fill: `rgb(${rgb[0]},${rgb[1]},${rgb[2]})`, text: abs >= 9 ? '#ffffff' : '#3f4756' };
  }

  // 类目标题条底色：趋势色向白色稀释，避免与深色标题文字冲突。
  function heatColorSoft(ma5) {
    if (ma5 == null || !Number.isFinite(ma5)) return '#eef1f3';
    const abs = Math.abs(ma5);
    const rgb = heatInterpolate(ma5 >= 0 ? HEAT_STOPS_UP : HEAT_STOPS_DOWN, abs);
    const mix = (a) => Math.round(a + (255 - a) * 0.66);
    return `rgb(${mix(rgb[0])},${mix(rgb[1])},${mix(rgb[2])})`;
  }

  function clipHeatText(text, maxChars) {
    const s = String(text ?? '');
    if (maxChars < 2) return '';
    return s.length <= maxChars ? s : `${s.slice(0, Math.max(1, maxChars - 1))}…`;
  }

  // 框面积：近20日平均成交额，缺失时回退当日成交额。
  function heatNodeSize(item) {
    const avg = Number(item?.amount_avg20);
    if (Number.isFinite(avg) && avg > 0) return avg;
    const amt = Number(item?.amount);
    if (Number.isFinite(amt) && amt > 0) return amt;
    return 0;
  }

  // 递归构建 treemap 节点，同时按面积占比估算像素边长，决定标签显示策略：
  // 大框显示名称+MA5，中框仅名称（超长截断），小框不显示文字。
  function buildHeatTree(group, canvasArea) {
    const l2Nodes = [];
    let total = 0;
    for (const l2 of group.items || []) {
      const l3Nodes = [];
      let l2Total = 0;
      for (const l3 of l2.children || []) {
        const leaves = [];
        let l3Total = 0;
        for (const inst of l3.children || []) {
          const size = heatNodeSize(inst);
          if (size <= 0) continue;
          leaves.push({ name: inst.name || inst.symbol, value: size, meta: inst, isLeaf: true });
          l3Total += size;
        }
        if (!leaves.length) continue;
        l3Nodes.push({ name: l3.category_l3, value: l3Total, children: leaves, meta: l3 });
        l2Total += l3Total;
      }
      if (!l3Nodes.length) continue;
      l2Nodes.push({ name: l2.category_l2, value: l2Total, children: l3Nodes, meta: l2 });
      total += l2Total;
    }
    const decorate = (node, share, depth) => {
      const side = Math.sqrt(Math.max(share, 0) * canvasArea);
      const meta = node.meta || {};
      if (depth === 3) {
        const color = heatColor(meta.trend_ma5);
        node.itemStyle = { color: color.fill };
        const fontSize = Math.max(10, Math.min(14, side / 7));
        node.label = { color: color.text, fontSize };
        // 叶子节点不设标题条（防止下钻后 levels 样式偏移时出现空白条）。
        node.upperLabel = { show: false };
        const chars = Math.floor((side * 0.9) / fontSize);
        let text = side < 32 ? '' : clipHeatText(node.name, chars);
        if (text && side >= 92) {
          const score = fmtScore(meta.trend_ma5);
          if (score !== '—') text += `\n${score}`;
        }
        node.labelText = text;
      } else {
        node.itemStyle = { color: heatColorSoft(meta.trend_ma5) };
        const chars = Math.floor(side / (depth === 1 ? 13 : 11));
        node.upperText = side < (depth === 1 ? 56 : 42) ? '' : clipHeatText(node.name, chars);
        // 标题条挂在节点自身：下钻改变层级时不随 levels 偏移。
        node.upperLabel = depth === 1
          ? { show: true, height: 24, fontSize: 13, fontWeight: 700, color: '#1f2937', formatter: (p) => p.data.upperText || '' }
          : { show: true, height: 17, fontSize: 11, color: '#52596b', formatter: (p) => p.data.upperText || '' };
      }
      const kids = node.children || [];
      const sum = kids.reduce((acc, kid) => acc + (Number(kid.value) || 0), 0);
      for (const kid of kids) {
        decorate(kid, sum > 0 ? share * (Number(kid.value) || 0) / sum : 0, depth + 1);
      }
    };
    for (const node of l2Nodes) {
      decorate(node, total > 0 ? (Number(node.value) || 0) / total : 0, 1);
    }
    return l2Nodes;
  }

  function heatTooltip(param) {
    const d = param.data || {};
    const m = d.meta || {};
    const ma5Class = (m.trend_ma5 || 0) >= 0 ? 'heat-tip-pos' : 'heat-tip-neg';
    if (d.isLeaf) {
      return [
        `<div class="heat-tip-title">${escHtml(d.name)}</div>`,
        `<div class="heat-tip-sub">${escHtml(m.symbol || '')} · ${escHtml(m.category_l2 || '')} / ${escHtml(m.category_l3 || '')}</div>`,
        `<table class="heat-tip-table">`,
        `<tr><td>趋势 MA5</td><td class="${ma5Class}">${fmtScore(m.trend_ma5)}</td></tr>`,
        `<tr><td>当日趋势值</td><td>${fmtScore(m.trend_score)}</td></tr>`,
        `<tr><td>强度</td><td>${m.strength == null ? '—' : m.strength}</td></tr>`,
        `<tr><td>日涨跌</td><td>${fmtChange(m.daily_change_pct)}</td></tr>`,
        `<tr><td>5日 / 20日</td><td>${fmtChange(m.change_5d)} / ${fmtChange(m.change_20d)}</td></tr>`,
        `<tr><td>近20日均成交额</td><td>${m.amount_avg20 == null ? '—' : fmtAmount(m.amount_avg20)}</td></tr>`,
        `</table>`,
      ].join('');
    }
    return [
      `<div class="heat-tip-title">${escHtml(d.name)}</div>`,
      `<div class="heat-tip-sub">${m.member_count == null ? '—' : m.member_count} 个标的 · 成交额加权</div>`,
      `<table class="heat-tip-table">`,
      `<tr><td>趋势 MA5</td><td class="${ma5Class}">${fmtScore(m.trend_ma5)}</td></tr>`,
      `<tr><td>强度</td><td>${m.strength == null ? '—' : m.strength}</td></tr>`,
      `<tr><td>日涨跌</td><td>${fmtChange(m.daily_change_pct)}</td></tr>`,
      `<tr><td>近20日均成交额</td><td>${m.amount_avg20 == null ? '—' : fmtAmount(m.amount_avg20)}</td></tr>`,
      `</table>`,
    ].join('');
  }

  function heatmapOption(group) {
    const width = heatmapChartEl.clientWidth || 1000;
    const height = heatmapChartEl.clientHeight || 560;
    const data = buildHeatTree(group, width * height);
    return {
      animationDuration: 400,
      tooltip: { confine: true, formatter: heatTooltip },
      series: [{
        type: 'treemap',
        name: group.category_l1,
        left: 0, right: 0, top: 0, bottom: 0,
        roam: false,
        nodeClick: 'zoomToNode',
        zoomToNodeRatio: 0.32,
        breadcrumb: {
          show: true,
          bottom: 2,
          left: 10,
          height: 22,
          emptyItemWidth: 0,
          itemStyle: { color: 'rgba(255, 255, 255, 0.94)', borderColor: 'rgba(20, 41, 51, 0.18)', borderWidth: 1, textStyle: { color: '#334155', fontSize: 12 } },
          emphasis: { itemStyle: { color: '#ffffff', textStyle: { color: '#0a5b55' } } },
        },
        label: { show: true, fontSize: 12, lineHeight: 15, formatter: (p) => p.data.labelText || '' },
        upperLabel: { show: false },
        levels: [
          { itemStyle: { borderWidth: 0, gapWidth: 0 } },
          // 当前视图的最外层分组：黑色粗框
          { itemStyle: { borderColor: '#1f2937', borderWidth: 2.5, gapWidth: 2.5 } },
          // 下一层分组：灰色细框
          { itemStyle: { borderColor: '#a3adb8', borderWidth: 1, gapWidth: 1 } },
          // 叶子标的
          { itemStyle: { borderColor: '#ffffff', borderWidth: 0.8, gapWidth: 0.5 } },
        ],
        data,
      }],
    };
  }

  function renderHeatmap(data) {
    heatmapPayload = data;
    const groups = data?.groups || [];
    if (!groups.length) {
      heatmapPanel.hidden = true;
      return;
    }
    if (!groups.some((g) => g.category_l1 === heatmapActiveL1)) {
      heatmapActiveL1 = groups[0].category_l1;
    }
    heatmapTabsEl.innerHTML = groups.map((g) => (
      `<button type="button" role="tab" class="heatmap-tab${g.category_l1 === heatmapActiveL1 ? ' is-active' : ''}" data-l1="${escHtml(g.category_l1)}">${escHtml(g.category_l1)}<span>${g.count} 个二级</span></button>`
    )).join('');
    heatmapPanel.hidden = false;
    if (!heatmapChart && window.echarts) {
      try {
        heatmapChart = echarts.init(heatmapChartEl);
      } catch (err) {
        heatmapChart = null;
      }
    }
    if (!heatmapChart) {
      heatmapPanel.hidden = true;
      return;
    }
    const group = groups.find((g) => g.category_l1 === heatmapActiveL1) || groups[0];
    heatmapChart.resize();
    heatmapChart.setOption(heatmapOption(group), true);
  }

  heatmapTabsEl.addEventListener('click', (event) => {
    const btn = event.target.closest('.heatmap-tab');
    if (!btn || !heatmapPayload) return;
    heatmapActiveL1 = btn.dataset.l1;
    renderHeatmap(heatmapPayload);
  });

  window.addEventListener('resize', () => {
    if (!heatmapChart || heatmapPanel.hidden || !heatmapPayload) return;
    heatmapChart.resize();
    clearTimeout(heatmapResizeTimer);
    heatmapResizeTimer = setTimeout(() => renderHeatmap(heatmapPayload), 160);
  });

const sparkline = (points, dates, upperPoints = [], lowerPoints = []) => {
    const axisTicks = [-15, -10, -5, 0, 5, 10, 15];
    const plotLeft = 18;
    const clamp = (value) => Math.max(-15, Math.min(15, value));
    const xFor = (index) => points.length > 1 ? plotLeft + index / (points.length - 1) * (100 - plotLeft) : (100 + plotLeft) / 2;
    const series = points.map((value, index) => ({ index, value, x: xFor(index) }));
    const values = series.filter(point => point.value != null && Number.isFinite(point.value));
    if (values.length < 2) return '<span class="spark-empty">—</span>';
    const y = (value) => 100 - ((clamp(value) + 15) / 30 * 84 + 8);
    const color = (value) => value > 0 ? '#c13f3a' : value < 0 ? '#187b5f' : '#8a9891';
    const timeTicks = [];
    let previousMonth = '';
    let previousWeek = '';
    for (const point of series) {
      const [year, month, day] = String(dates?.[point.index] || '').slice(0, 10).split('-').map(Number);
      if (!year || !month || !day) continue;
      const date = new Date(Date.UTC(year, month - 1, day));
      const monthKey = `${year}-${month}`;
      const monday = new Date(date);
      monday.setUTCDate(date.getUTCDate() - ((date.getUTCDay() + 6) % 7));
      const weekKey = monday.toISOString().slice(0, 10);
      if (monthKey !== previousMonth) {
        timeTicks.push(`<line class="spark-time-tick spark-month-tick" x1="${point.x.toFixed(1)}" y1="84" x2="${point.x.toFixed(1)}" y2="100"/>`);
        previousMonth = monthKey;
        previousWeek = weekKey;
      } else if (weekKey !== previousWeek) {
        timeTicks.push(`<line class="spark-time-tick spark-week-tick" x1="${point.x.toFixed(1)}" y1="91" x2="${point.x.toFixed(1)}" y2="100"/>`);
        previousWeek = weekKey;
      }
    }
    const segments = [];
    for (let index = 1; index < series.length; index += 1) {
      const previous = series[index - 1], current = series[index];
      if (!Number.isFinite(previous.value) || !Number.isFinite(current.value)) continue;
      if (current.index === values[values.length - 1].index) continue;
      const from = { x: previous.x, y: y(previous.value) };
      const to = { x: current.x, y: y(current.value) };
      if ((previous.value > 0 && current.value < 0) || (previous.value < 0 && current.value > 0)) {
        const ratio = -previous.value / (current.value - previous.value);
        const crossing = { x: previous.x + (current.x - previous.x) * ratio, y: y(0) };
        segments.push(`<line x1="${from.x.toFixed(1)}" y1="${from.y.toFixed(1)}" x2="${crossing.x.toFixed(1)}" y2="${crossing.y.toFixed(1)}" stroke="${color(previous.value)}"/>`);
        segments.push(`<line x1="${crossing.x.toFixed(1)}" y1="${crossing.y.toFixed(1)}" x2="${to.x.toFixed(1)}" y2="${to.y.toFixed(1)}" stroke="${color(current.value)}"/>`);
      } else {
        segments.push(`<line x1="${from.x.toFixed(1)}" y1="${from.y.toFixed(1)}" x2="${to.x.toFixed(1)}" y2="${to.y.toFixed(1)}" stroke="${color(current.value || previous.value)}"/>`);
      }
    }
    const latest = values[values.length - 1];
    const zeroY = y(0).toFixed(1);
    const latestClass = latest.value > 0 ? 'is-positive' : latest.value < 0 ? 'is-negative' : 'is-neutral';
    const pointsFor = (history) => history
      .map((value, index) => value != null && Number.isFinite(value) ? `${xFor(index).toFixed(1)},${y(value).toFixed(1)}` : '')
      .filter(Boolean).join(' ');
    const bandPairs = points.map((_, index) => {
      const upper = upperPoints[index], lower = lowerPoints[index];
      return Number.isFinite(upper) && Number.isFinite(lower) ? { index, upper, lower } : null;
    }).filter(Boolean);
    const band = bandPairs.length > 1 ? `${bandPairs.map(point => `${xFor(point.index).toFixed(1)},${y(point.upper).toFixed(1)}`).join(' ')} ${[...bandPairs].reverse().map(point => `${xFor(point.index).toFixed(1)},${y(point.lower).toFixed(1)}`).join(' ')}` : '';
    const yGrid = axisTicks.filter(value => value !== 0).map(value => `<line class="spark-y-grid" x1="${plotLeft}" y1="${y(value).toFixed(1)}" x2="100" y2="${y(value).toFixed(1)}"/>`).join('');
    const yLabels = axisTicks.map(value => `<span class="spark-y-label" style="top:${y(value).toFixed(1)}%">${value > 0 ? '+' : ''}${value}</span>`).join('');
    const upperLine = pointsFor(upperPoints);
    const lowerLine = pointsFor(lowerPoints);
    return `<div class="spark-plot">${yLabels}<svg viewBox="0 0 100 100" preserveAspectRatio="none" aria-label="近三月趋势 MA5"><g class="spark-y-axis">${yGrid}</g><g class="spark-time-axis">${timeTicks.join('')}</g>${band ? `<polygon class="spark-range-band" points="${band}"/>` : ''}${upperLine ? `<polyline class="spark-bound spark-bound-upper" points="${upperLine}"/>` : ''}${lowerLine ? `<polyline class="spark-bound spark-bound-lower" points="${lowerLine}"/>` : ''}<line class="spark-zero-axis" x1="${plotLeft}" y1="${zeroY}" x2="100" y2="${zeroY}"/>${segments.join('')}</svg><span class="spark-latest-dot ${latestClass}" style="left:${latest.x.toFixed(1)}%;top:${y(latest.value).toFixed(1)}%" aria-label="最新趋势值"></span></div>`;
  };
  const rowLabel = (item, level) => {
    if (level === 'l2') return { name: item.category_l2, sub: `${item.child_count} 个三级类目 · ${item.member_count} 个标的 · 成交额加权` };
    if (level === 'l3') return { name: item.category_l3, sub: `${item.child_count} 个标的 · 成交额加权` };
    return { name: item.name || item.symbol, sub: `${item.symbol} · 具体标的` };
  };
  const renderRow = (item, level, depth) => {
    const children = item.children || [];
    const expandable = children.length > 0;
    const childId = expandable ? `subjectChildren${++nodeSequence}` : '';
    const label = rowLabel(item, level);
    const scoreClass = (item.trend_score || 0) >= 0 ? 'is-positive' : 'is-negative';
    const ma5Class = (item.trend_ma5 || 0) >= 0 ? 'is-positive' : 'is-negative';
    const metrics = `<div class="index-phase">${fmtPhase(item)}</div>
      <div class="index-score ${ma5Class}">${fmtScore(item.trend_ma5)}</div>
      <div class="index-score ${scoreClass}">${fmtScore(item.trend_score)}</div>
      <div class="index-change ${getChangeClass(item.change_60d)}">${fmtChange(item.change_60d)}</div>
      <div class="index-change ${getChangeClass(item.change_20d)}">${fmtChange(item.change_20d)}</div>
      <div class="index-change ${getChangeClass(item.change_5d)}">${fmtChange(item.change_5d)}</div>
      <div class="index-change ${getChangeClass(item.daily_change_pct)}">${fmtChange(item.daily_change_pct)}</div>
      <div class="index-spark">${sparkline(item.trend_history || [], item.trend_dates || [], item.trend_upper_history || [], item.trend_lower_history || [])}</div>
      <div class="index-amount">${fmtAmount(item.amount)}</div>
      <div class="index-strength">${item.strength == null ? '—' : item.strength}</div>`;
    const row = `<div class="index-row subject-row subject-row-${level}${expandable ? ' is-expandable' : ''}" data-depth="${depth}"${expandable ? ` data-target="${childId}" aria-expanded="false" tabindex="0" role="button"` : ''}>
      <div class="index-name"><strong>${expandable ? '<span class="subject-caret" aria-hidden="true">›</span>' : '<span class="subject-leaf" aria-hidden="true"></span>'}${label.name}</strong><span>${label.sub}</span></div>${metrics}
    </div>`;
    if (!expandable) return row;
    const nextLevel = level === 'l2' ? 'l3' : 'instrument';
    return `${row}<div id="${childId}" class="subject-children" data-depth="${depth + 1}" hidden>${children.map(child => renderRow(child, nextLevel, depth + 1)).join('')}</div>`;
  };
  const renderGroup = (group) => `<section class="index-provider subject-l1"><div class="index-provider-head"><h2>${group.category_l1}</h2><span>${group.count} 个二级类目</span></div><div class="index-grid-head"><span>二级类目</span><span>趋势相位</span><span>趋势MA5</span><span>趋势</span><span>60日变动</span><span>20日变动</span><span>5日变动</span><span>日变动</span><span>近3月趋势 MA5</span><span>成交额</span><span>强度</span></div><div class="subject-tree">${group.items.map(item => renderRow(item, 'l2', 0)).join('')}</div></section>`;
  const toggleRow = (row) => {
    const children = document.getElementById(row.dataset.target);
    if (!children) return;
    const expanded = row.getAttribute('aria-expanded') === 'true';
    row.setAttribute('aria-expanded', String(!expanded));
    row.classList.toggle('is-expanded', !expanded);
    children.hidden = expanded;
  };
  board.addEventListener('click', (event) => {
    const row = event.target.closest('.subject-row.is-expandable');
    if (row) toggleRow(row);
  });
  board.addEventListener('keydown', (event) => {
    if (event.key !== 'Enter' && event.key !== ' ') return;
    const row = event.target.closest('.subject-row.is-expandable');
    if (row) { event.preventDefault(); toggleRow(row); }
  });
  async function loadBoard() {
    try {
      const response = await fetch('/subject-market/api/dashboard');
      const data = await response.json();
      if (!response.ok) throw new Error(data.detail || '标的看板加载失败');
      nodeSequence = 0;
      board.innerHTML = (data.groups || []).map(renderGroup).join('');
      renderHeatmap(data);
      isIntradayMode = false;
      statusEl.innerHTML = board.children.length
        ? `${data.as_of || '最新交易日'} · ${data.groups.length || 0} 个一级类目、${data.secondary_count || 0} 个二级类目、${data.category_count || 0} 个三级类目。`
        : '暂无具备完整三级分类和本地日K数据的标的。';
      statusEl.className = 'context-hint';
    } catch (error) {
      statusEl.textContent = error.message || '标的看板加载失败';
      statusEl.className = 'context-hint';
    }
  }

  // ---- Intraday button & progress -----------------------------------------
  async function checkTradingStatus() {
    try {
      const resp = await fetch('/subject-market/api/trading-status');
      const status = await resp.json();
      if (status.is_realtime_available) {
        intradayBtn.disabled = false;
        intradayBtn.title = '点击获取基于实时报价的盘中趋势值看板（午间休盘也可用）';
      } else {
        intradayBtn.disabled = true;
        intradayBtn.title = status.next_session || '非交易时段';
      }
    } catch (e) {
      intradayBtn.disabled = true;
    }
  }

  intradayBtn.addEventListener('click', async () => {
    if (intradayBtn.disabled) return;
    intradayBtn.disabled = true;
    intradayBtn.textContent = '⏳ 正在启动…';
    intradayProgress.hidden = false;
    intradayProgressBar.value = 0;
    intradayProgressText.textContent = '正在启动盘中计算…';

    try {
      // Start the intraday job.
      const startResp = await fetch('/subject-market/api/intraday-dashboard/start', { method: 'POST' });
      if (!startResp.ok) {
        const err = await startResp.json();
        throw new Error(err.detail || '启动失败');
      }
      const { job_id } = await startResp.json();

      // Poll progress.
      const poll = async () => {
        const progResp = await fetch(`/subject-market/api/intraday-dashboard/progress/${job_id}`);
        if (!progResp.ok) throw new Error('进度查询失败');
        const prog = await progResp.json();
        intradayProgressBar.value = Math.round(prog.percent * 100);
        intradayProgressText.textContent = prog.message || `${(prog.percent * 100).toFixed(0)}%`;
        return prog;
      };

      let prog = await poll();
      while (prog.status === 'started' || prog.status === 'running') {
        await new Promise(r => setTimeout(r, 500));
        prog = await poll();
      }

      if (prog.status === 'error') {
        throw new Error(prog.message || '盘中计算失败');
      }

      // Fetch the result.
      const resultResp = await fetch(`/subject-market/api/intraday-dashboard/result/${job_id}`);
      if (!resultResp.ok) {
        const err = await resultResp.json();
        throw new Error(err.detail || '获取结果失败');
      }
      const data = await resultResp.json();

      // Render.
      nodeSequence = 0;
      board.innerHTML = (data.groups || []).map(renderGroup).join('');
      renderHeatmap(data);
      isIntradayMode = true;
      statusEl.innerHTML = board.children.length
        ? `<span class="intraday-dot"></span> 盘中实时 · ${data.as_of || ''} · ⚠️ 数据基于当前实时价格估算，非最终盘后确认值`
        : '盘中无可用数据。';
      statusEl.className = 'intraday-status-bar';
    } catch (error) {
      statusEl.textContent = '盘中计算失败: ' + (error.message || '未知错误');
      statusEl.className = 'context-hint';
    } finally {
      intradayProgress.hidden = true;
      intradayBtn.textContent = '🟠 获取盘中实时看板';
      // Re-check trading status in case we crossed a boundary.
      checkTradingStatus();
    }
  });

  // Init.
  loadBoard();
  checkTradingStatus();
  // Re-check trading status every 60 seconds.
  setInterval(checkTradingStatus, 60000);
</script>
{% endblock %}
