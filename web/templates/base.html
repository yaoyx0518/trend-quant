<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ title }} | 趋势 ETF 系统</title>
  <link rel="stylesheet" href="/static/style.css?v={{ request.app.state.asset_version|default('1', true) if request is defined else '1' }}-20260711-layout-fix-3">
</head>
<body>
  {% set path = request.url.path if request is defined else '' %}
  <header class="site-header">
    <div class="site-header__inner">
      <div class="site-brand">
        <p class="site-eyebrow">趋势跟踪工作台</p>
        <h1>趋势 ETF 系统</h1>
        <p class="site-subtitle">面向 A 股 ETF 策略的研究、信号复盘、手工执行与回测分析。</p>
      </div>
      <nav class="site-nav">
        <a href="/" class="{% if path == '/' %}is-active{% endif %}">概览</a>
        <a href="/parameter-optimization" class="{% if path.startswith('/parameter-optimization') %}is-active{% endif %}">参数优化</a>
        <a href="/backtest" class="{% if path.startswith('/backtest') %}is-active{% endif %}">回测</a>
        <a href="/rule-backtest" class="{% if path.startswith('/rule-backtest') %}is-active{% endif %}">策略管理</a>
        <a href="/market-view" class="{% if path.startswith('/market-view') %}is-active{% endif %}">标的查看</a>
        <a href="/subject-market" class="{% if path.startswith('/subject-market') %}is-active{% endif %}">标的看板</a>
        <a href="/instruments" class="{% if path.startswith('/instruments') %}is-active{% endif %}">标的管理</a>
        <a href="/trades" class="{% if path.startswith('/trades') %}is-active{% endif %}">手工交易</a>
        <a href="/logs" class="{% if path.startswith('/logs') %}is-active{% endif %}">日志</a>
      </nav>
    </div>
  </header>
  <div id="dailyUpdateBar" class="daily-update-bar" role="status" aria-live="polite">
    <span class="daily-update-bar__icon">📊</span>
    <span class="daily-update-bar__text" id="duText"></span>
    <span class="daily-update-bar__detail" id="duDetail" title="点击查看失败标的详情"></span>
    <button class="daily-update-bar__close" id="duClose" title="关闭提示">&times;</button>
  </div>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script>
  (function() {
    const bar = document.getElementById('dailyUpdateBar');
    const textEl = document.getElementById('duText');
    const detailEl = document.getElementById('duDetail');
    const closeBtn = document.getElementById('duClose');
    const STORAGE_KEY = 'du_last_seen_ts';

    let lastSeenTs = localStorage.getItem(STORAGE_KEY) || '';

    function showBar(status) {
      if (!status || !status.completed) return;
      if (status.ts === lastSeenTs) return;

      const total = status.total || 0;
      const success = status.success || 0;
      const failed = status.failed || 0;
      const failedSymbols = status.failed_symbols || [];

      textEl.textContent = '盘后数据更新完成 (16:30)：成功 ' + success + ' 只';

      bar.classList.remove('has-errors');
      detailEl.style.display = 'none';
      detailEl.textContent = '';

      if (failed > 0) {
        textEl.textContent += '，失败 ' + failed + ' 只';
        bar.classList.add('has-errors');
        if (failedSymbols.length > 0) {
          detailEl.textContent = '失败标的: ' + failedSymbols.join(', ');
          detailEl.style.display = 'inline';
        }
      }

      bar.classList.add('is-visible');
    }

    function hideBar() {
      bar.classList.remove('is-visible');
      // Remember this update so it won't show again.
      const text = textEl.textContent;
      // Store current state as seen.
      fetch('/api/daily-update/status')
        .then(function(r) { return r.json(); })
        .then(function(s) {
          if (s && s.ts) {
            localStorage.setItem(STORAGE_KEY, s.ts);
            lastSeenTs = s.ts;
          }
        })
        .catch(function() {});
    }

    function poll() {
      fetch('/api/daily-update/status')
        .then(function(r) { return r.json(); })
        .then(function(status) {
          if (status && status.completed && status.ts && status.ts !== lastSeenTs) {
            showBar(status);
          }
        })
        .catch(function() {});
    }

    closeBtn.addEventListener('click', hideBar);

    // Poll every 30 seconds; also check once on page load.
    poll();
    setInterval(poll, 30000);
  })();
  </script>
</body>
</html>
